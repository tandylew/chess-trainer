<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blindfold Chess Trainer</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface-2: #2e2e2e;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #a8c0e8;
      --ok: #7bd88f;
      --bad: #ef6c6c;
      --sq-light: #f0d9b5;
      --sq-dark: #b58863;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* Views */
    .view { display: none; padding: 2rem; min-height: 100dvh; }
    .view.active { display: flex; flex-direction: column; }

    /* Menu */
    #view-menu { align-items: center; justify-content: center; gap: 2rem; }
    #view-menu h1 { font-size: 1.5rem; letter-spacing: 0.04em; }
    .drill-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 360px;
    }
    .drill-list a {
      display: block;
      padding: 1rem 1.5rem;
      background: var(--surface);
      color: var(--accent);
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      text-align: center;
    }
    .drill-list a:active { background: var(--surface-2); }

    /* Drill views */
    .drill-view { gap: 1.25rem; }
    .drill-view h2 { font-size: 1.25rem; }
    .back-btn {
      align-self: flex-start;
      background: none;
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .back-btn:active { color: var(--text); border-color: var(--text); }

    .drill-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    /* Shared drill UI */
    .btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:active { background: var(--surface-2); }
    .btn[disabled] { opacity: 0.5; cursor: default; }
    .btn-xl {
      padding: 1.75rem 1.25rem;
      font-size: 1.25rem;
    }
    .btn-primary {
      background: var(--accent);
      color: #1a1a1a;
      border-color: var(--accent);
      font-weight: 600;
    }
    .drill-feedback {
      min-height: 1.5rem;
      font-size: 1rem;
      font-weight: 500;
    }
    .drill-feedback.ok  { color: var(--ok); }
    .drill-feedback.bad { color: var(--bad); }
    .drill-tally {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .drill-end {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding-top: 2rem;
    }
    .drill-end-score {
      font-size: 1.25rem;
      text-align: center;
    }

    /* Square Color */
    .sc-prompt {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 1rem 0;
      color: var(--muted);
    }
    .sc-prompt.sc-prompt-fallback { color: var(--text); }
    .sc-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    /* Knight Sight + Diagonal Sweep shared text-input UI */
    .drill-prompt {
      font-size: 1.1rem;
      line-height: 1.4;
      color: var(--text);
    }
    .drill-input-row {
      display: flex;
      gap: 0.5rem;
    }
    .drill-input {
      flex: 1;
      background: var(--surface);
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: inherit;
    }
    .drill-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .mic-btn {
      width: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 1.2rem;
    }
    .mic-btn.listening { background: var(--accent); color: #1a1a1a; }
    .drill-note {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Piece Tracking */
    .pt-sequence {
      color: var(--muted);
      font-size: 0.95rem;
      font-family: monospace;
      min-height: 1.5rem;
    }
    .pt-question {
      font-size: 1.15rem;
    }
    .pt-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    /* Peek board overlay */
    #peek-board {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
    }
    #peek-board.hidden { display: none; }
    .peek-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: min(88vw, 88vh);
      aspect-ratio: 1;
      border: 2px solid #555;
    }
    .sq { position: relative; }
    .sq.light { background: var(--sq-light); }
    .sq.dark  { background: var(--sq-dark); }
    .sq-label {
      position: absolute;
      bottom: 2px;
      left: 3px;
      font-size: clamp(0.4rem, 1.2vw, 0.65rem);
      line-height: 1;
      font-family: monospace;
      pointer-events: none;
    }
    .sq.light .sq-label { color: rgba(0, 0, 0, 0.45); }
    .sq.dark  .sq-label { color: rgba(255, 255, 255, 0.4); }
  </style>
</head>
<body>

  <!-- Menu -->
  <div id="view-menu" class="view active">
    <h1>Blindfold Chess Trainer</h1>
    <ul class="drill-list">
      <li><a href="#square-color">Square Color</a></li>
      <li><a href="#knight-sight">Knight Sight</a></li>
      <li><a href="#piece-tracking">Piece Tracking</a></li>
      <li><a href="#diagonal-sweep">Diagonal Sweep</a></li>
    </ul>
  </div>

  <!-- Drill: Square Color -->
  <div id="view-square-color" class="view drill-view">
    <button class="back-btn">← Back to Menu</button>
    <h2>Square Color</h2>
    <div class="drill-body" data-drill="square-color"></div>
  </div>

  <!-- Drill: Knight Sight -->
  <div id="view-knight-sight" class="view drill-view">
    <button class="back-btn">← Back to Menu</button>
    <h2>Knight Sight</h2>
    <div class="drill-body" data-drill="knight-sight"></div>
  </div>

  <!-- Drill: Piece Tracking -->
  <div id="view-piece-tracking" class="view drill-view">
    <button class="back-btn">← Back to Menu</button>
    <h2>Piece Tracking</h2>
    <div class="drill-body" data-drill="piece-tracking"></div>
  </div>

  <!-- Drill: Diagonal Sweep -->
  <div id="view-diagonal-sweep" class="view drill-view">
    <button class="back-btn">← Back to Menu</button>
    <h2>Diagonal Sweep</h2>
    <div class="drill-body" data-drill="diagonal-sweep"></div>
  </div>

  <!-- Peek board overlay (populated by peek.js) -->
  <div id="peek-board" class="hidden"></div>

  <script type="module" src="src/drills.js"></script>
  <script type="module" src="src/peek.js"></script>
</body>
</html>
